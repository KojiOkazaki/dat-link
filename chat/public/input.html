<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Interview · Input</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background:
      radial-gradient(circle at 20% 0%,  rgba(124, 246, 200, 0.10), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(91, 141, 239, 0.08), transparent 50%),
      #0a0e14;
    color: #fff;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue",
                 "Hiragino Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ---------- top bar ---------- */
  .topbar {
    padding: max(env(safe-area-inset-top), 12px) 18px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    background: rgba(10, 14, 20, 0.7);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .title {
    font-size: 14px;
    letter-spacing: 0.28em;
    color: #7cf6c8;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #8a93a3;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
  }
  .dot.live      { background: #7cf6c8; box-shadow: 0 0 8px #7cf6c8; }
  .dot.thinking  { background: #ffce5b; box-shadow: 0 0 8px #ffce5b; animation: pulse 1s infinite; }
  .dot.error     { background: #ff5b6e; box-shadow: 0 0 8px #ff5b6e; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ---------- chat ---------- */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 86%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 16px;
    line-height: 1.5;
    border: 1px solid rgba(124, 246, 200, 0.18);
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    word-break: break-word;
    animation: rise 0.22s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    border-color: rgba(124, 246, 200, 0.45);
    background: rgba(124, 246, 200, 0.10);
    color: #e8fff4;
  }
  .msg.assistant { align-self: flex-start; color: #e8fff4; }
  .msg.hint {
    border-color: rgba(255, 206, 91, 0.4);
    background: rgba(255, 206, 91, 0.06);
    color: #ffe8a8;
  }
  .msg .who {
    display: block;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #7cf6c8;
    margin-bottom: 4px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .msg.user .who { color: #7cf6c8; text-align: right; }
  .msg.hint .who { color: #ffce5b; }

  .empty {
    margin: auto;
    color: #555;
    font-size: 13px;
    letter-spacing: 0.2em;
  }

  /* ---------- suggestions ---------- */
  .suggs {
    padding: 0 16px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .sugg {
    flex: 1 1 auto;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(124, 246, 200, 0.3);
    color: #cfd6e0;
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 150ms ease;
  }
  .sugg:active { background: rgba(124, 246, 200, 0.18); color: #7cf6c8; }
  .sugg:disabled { opacity: 0.4; }

  /* ---------- composer ---------- */
  .composer {
    padding: 10px 12px max(env(safe-area-inset-bottom), 14px);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: rgba(10, 14, 20, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  .mic, .send {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border-radius: 24px;
    border: 1px solid rgba(124, 246, 200, 0.3);
    background: rgba(255, 255, 255, 0.04);
    color: #cfd6e0;
    font-size: 20px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 150ms ease;
  }
  .mic:active, .send:active {
    background: rgba(124, 246, 200, 0.2);
    color: #7cf6c8;
  }
  .mic.recording {
    background: rgba(255, 91, 110, 0.2);
    border-color: #ff5b6e;
    color: #ff5b6e;
    animation: pulse 1s infinite;
  }
  .send { color: #7cf6c8; border-color: #7cf6c8; }
  .send:disabled, .mic:disabled { opacity: 0.4; }

  textarea {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 24px;
    padding: 12px 16px;
    color: #fff;
    font-size: 16px;
    font-family: inherit;
    line-height: 1.4;
    resize: none;
    max-height: 140px;
    min-height: 48px;
    outline: none;
    transition: border-color 150ms ease;
  }
  textarea:focus { border-color: rgba(124, 246, 200, 0.5); }
  textarea::placeholder { color: #555; }

  .footer {
    text-align: center;
    font-size: 10px;
    color: #2a2f3a;
    letter-spacing: 0.3em;
    padding: 4px 0 0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="title">INTERVIEW · INPUT</div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusTxt">…</span>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="empty" id="empty">…</div>
  </div>

  <div class="suggs" id="suggs"></div>

  <div class="composer">
    <button class="mic" id="micBtn" title="音声入力" aria-label="voice input">🎤</button>
    <textarea id="ta" rows="1" placeholder="答えを入力..."></textarea>
    <button class="send" id="sendBtn" title="送信" aria-label="send">➤</button>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const chat   = $('chat');
  const empty  = $('empty');
  const suggs  = $('suggs');
  const ta     = $('ta');
  const sendBtn = $('sendBtn');
  const micBtn  = $('micBtn');

  let history     = [];
  let suggestions = [];
  let busy        = false;

  /* ---------- rendering ---------- */
  function renderChat() {
    chat.innerHTML = '';
    if (!history.length) {
      chat.appendChild(empty);
      return;
    }
    for (const m of history) {
      const div = document.createElement('div');
      div.className = 'msg ' + m.role + (m.kind === 'hint' ? ' hint' : '');
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = m.role === 'user'
        ? 'YOU'
        : (m.kind === 'hint' ? 'HINT' : 'INTERVIEWER');
      const body = document.createElement('div');
      body.textContent = m.content.replace(/^HINT:\s*/, '');
      div.appendChild(who);
      div.appendChild(body);
      chat.appendChild(div);
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function renderSuggs() {
    suggs.innerHTML = '';
    suggestions.forEach(s => {
      const b = document.createElement('button');
      b.className = 'sugg';
      b.textContent = s;
      b.disabled = busy;
      b.addEventListener('click', () => sendText(s));
      suggs.appendChild(b);
    });
  }

  function setStatus(state, text) {
    $('dot').className = 'dot ' + state;
    $('statusTxt').textContent = text;
  }

  /* ---------- API ---------- */
  async function sendText(text) {
    if (busy || !text.trim()) return;
    busy = true;
    setStatus('thinking', 'THINKING');
    sendBtn.disabled = true; micBtn.disabled = true;
    renderSuggs();
    try {
      await fetch('/api/say', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text.trim() }),
      });
      ta.value = '';
      autoSize();
    } catch (e) {
      setStatus('error', 'OFFLINE');
    } finally {
      sendBtn.disabled = false; micBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', () => sendText(ta.value));
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      sendText(ta.value);
    }
  });

  function autoSize() {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  }
  ta.addEventListener('input', autoSize);

  /* ---------- voice (Web Speech API, ja-JP) ---------- */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;
  if (SR) {
    recog = new SR();
    recog.lang = 'ja-JP';
    recog.interimResults = true;
    recog.continuous = false;
    recog.onresult = e => {
      let final = '', interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t; else interim += t;
      }
      if (final)   ta.value = (ta.value + final).trim();
      else if (interim) ta.placeholder = interim;
      autoSize();
    };
    recog.onend = () => {
      micBtn.classList.remove('recording');
      ta.placeholder = '答えを入力...';
    };
    recog.onerror = () => {
      micBtn.classList.remove('recording');
      ta.placeholder = '音声認識エラー';
      setTimeout(() => { ta.placeholder = '答えを入力...'; }, 1500);
    };
    micBtn.addEventListener('click', () => {
      if (micBtn.classList.contains('recording')) {
        try { recog.stop(); } catch {}
      } else {
        try {
          recog.start();
          micBtn.classList.add('recording');
          ta.placeholder = '聞き取り中…';
        } catch {}
      }
    });
  } else {
    micBtn.disabled = true;
    micBtn.title = 'このブラウザは音声認識非対応';
  }

  /* ---------- SSE ---------- */
  function connect() {
    const es = new EventSource('/api/events');
    es.onopen  = () => setStatus('live', 'LIVE');
    es.onerror = () => {
      setStatus('error', 'RECONNECTING');
      setTimeout(() => { try { es.close(); } catch{} connect(); }, 2000);
    };
    es.onmessage = ev => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'snapshot') {
        history     = m.history     || [];
        suggestions = m.suggestions || [];
        busy = false;
        setStatus('live', 'LIVE');
        renderChat();
        renderSuggs();
      } else if (m.type === 'append') {
        history.push(m.message);
        renderChat();
        if (m.message.role === 'assistant') {
          busy = false;
          setStatus('live', 'LIVE');
        }
      } else if (m.type === 'suggestions') {
        suggestions = m.suggestions || [];
        busy = false;
        setStatus('live', 'LIVE');
        renderSuggs();
      }
    };
  }
  connect();
</script>
</body>
</html>
