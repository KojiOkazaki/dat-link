<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
<title>Interview</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 600px;
    height: 600px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue",
                 "Hiragino Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    width: 600px;
    height: 600px;
    display: flex;
    flex-direction: column;
    padding: 10px 16px 14px;
    gap: 8px;
  }

  /* ---------- top bar ---------- */
  .topbar {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    font-size: 12px;
    letter-spacing: 0.16em;
    color: #8a93a3;
  }
  .topbar .L { display: flex; align-items: center; gap: 12px; }
  .topbar .R { display: flex; align-items: center; gap: 8px; }
  .topbar .brand { color: #7cf6c8; font-weight: 500; }
  .topbar .pill {
    background: rgba(124, 246, 200, 0.08);
    border: 1px solid rgba(124, 246, 200, 0.25);
    color: #cfd6e0;
    padding: 2px 8px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; transition: all 0.3s ease;
  }
  .dot.live     { background: #7cf6c8; box-shadow: 0 0 8px #7cf6c8; }
  .dot.thinking { background: #ffce5b; box-shadow: 0 0 8px #ffce5b;
                  animation: pulse 1s infinite; }
  .dot.error    { background: #ff5b6e; box-shadow: 0 0 8px #ff5b6e; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ---------- chat ---------- */
  .chat {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 6px;
    overflow: hidden;
    padding: 2px;
  }
  .msg {
    max-width: 92%;
    padding: 10px 14px;
    border-radius: 13px;
    font-size: 18px;
    line-height: 1.42;
    font-weight: 300;
    border: 1px solid rgba(124, 246, 200, 0.18);
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    word-break: break-word;
    animation: rise 0.22s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    border-color: rgba(255, 255, 255, 0.28);
    background: rgba(255, 255, 255, 0.07);
  }
  .msg.assistant { align-self: flex-start; color: #e8fff4; }
  .msg.hint {
    border-color: rgba(255, 206, 91, 0.4);
    background: rgba(255, 206, 91, 0.06);
    color: #ffe8a8;
    font-size: 16px;
  }
  .msg .who {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #7cf6c8;
    margin-bottom: 3px;
    text-transform: uppercase;
  }
  .msg.user .who { color: #cfd6e0; text-align: right; }
  .msg.hint .who { color: #ffce5b; }
  .empty {
    align-self: center;
    margin: auto;
    font-size: 13px;
    color: #444;
    letter-spacing: 0.2em;
  }

  /* ---------- action area ---------- */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .row { display: flex; gap: 6px; }
  .row:empty { display: none; }

  .focusable {
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
    border: 1px solid rgba(124, 246, 200, 0.25);
    border-radius: 11px;
    padding: 6px 10px;
    font-family: inherit;
    font-weight: 300;
    letter-spacing: 0.02em;
    cursor: pointer;
    text-align: center;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 130ms ease;
    word-break: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.3;
  }
  .focusable:focus {
    outline: none;
    border-color: #7cf6c8;
    color: #7cf6c8;
    background: rgba(124, 246, 200, 0.12);
    box-shadow: 0 0 18px rgba(124, 246, 200, 0.45);
  }
  .focusable:disabled { opacity: 0.4; cursor: default; }

  .cat {
    flex: 1;
    min-height: 56px;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #8a93a3;
    border-color: rgba(255, 255, 255, 0.14);
  }
  .cat.active {
    color: #7cf6c8;
    border-color: rgba(124, 246, 200, 0.6);
    background: rgba(124, 246, 200, 0.08);
  }
  .cat:focus { color: #7cf6c8; border-color: #7cf6c8; }

  .sugg {
    flex: 1;
    min-height: 88px;
    font-size: 15px;
  }

  .fb {
    flex: 1;
    min-height: 60px;
    font-size: 13px;
    color: #cfd6e0;
    border-color: rgba(255, 255, 255, 0.18);
  }

  .sys {
    flex: 1;
    min-height: 56px;
    font-size: 13px;
    letter-spacing: 0.22em;
    color: #8a93a3;
    border-color: rgba(255, 255, 255, 0.14);
  }
</style>
</head>
<body>
<div class="stage">

  <div class="topbar">
    <div class="L">
      <span class="brand">INTERVIEW</span>
      <span class="pill" id="catLabel">—</span>
    </div>
    <div class="R">
      <span class="pill" id="qNum">Q0</span>
      <span class="pill" id="timer">00:00</span>
      <span class="dot" id="dot"></span>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="empty">…</div>
  </div>

  <div class="actions">
    <div class="row" id="catRow"></div>
    <div class="row" id="suggRow1"></div>
    <div class="row" id="suggRow2"></div>
    <div class="row" id="fbRow"></div>
    <div class="row" id="sysRow"></div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);

  const CATS = [
    { id: 'self_pr',    label: '自己PR' },
    { id: 'gakuchika',  label: 'ガクチカ' },
    { id: 'motivation', label: '志望動機' },
    { id: 'reverse',    label: '逆質問' },
  ];

  const FALLBACKS = [
    'もう一度お願いします。',
    '少し考えさせてください。',
    '具体例を挙げますね。',
  ];

  let history     = [];
  let suggestions = [];
  let stateObj    = { category: 'self_pr', questionNum: 0, startedAt: null };
  let busy        = false;

  function fmtTime(ms) {
    if (!ms) return '00:00';
    const s = Math.floor(ms / 1000);
    return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }
  setInterval(() => {
    $('timer').textContent = stateObj.startedAt
      ? fmtTime(Date.now() - stateObj.startedAt) : '00:00';
  }, 1000);

  function renderChat() {
    const chat = $('chat');
    chat.innerHTML = '';
    if (!history.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = 'CHOOSE A CATEGORY TO START';
      chat.appendChild(e);
      return;
    }
    for (const m of history.slice(-3)) {
      const div = document.createElement('div');
      div.className = 'msg ' + m.role + (m.kind === 'hint' ? ' hint' : '');
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = m.role === 'user'
        ? 'YOU'
        : (m.kind === 'hint' ? 'HINT' : 'INTERVIEWER');
      const body = document.createElement('div');
      body.textContent = m.content.replace(/^HINT:\s*/, '');
      div.appendChild(who);
      div.appendChild(body);
      chat.appendChild(div);
    }
  }

  function renderTop() {
    const cat = CATS.find(c => c.id === stateObj.category);
    $('catLabel').textContent = cat ? cat.label : '—';
    $('qNum').textContent     = 'Q' + (stateObj.questionNum || 0);
  }

  function suggBtn(text, key) {
    const b = document.createElement('button');
    b.className = 'focusable sugg';
    b.dataset.key = key;
    b.textContent = text;
    b.disabled = busy;
    b.addEventListener('click', () => sendText(text));
    return b;
  }

  function renderActions() {
    const prevFocus = document.activeElement && document.activeElement.dataset
                      ? document.activeElement.dataset.key : null;

    const catRow = $('catRow');
    catRow.innerHTML = '';
    CATS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'focusable cat' + (c.id === stateObj.category ? ' active' : '');
      b.dataset.key = 'cat-' + c.id;
      b.textContent = c.label;
      b.disabled = busy;
      b.addEventListener('click', () => switchCategory(c.id));
      catRow.appendChild(b);
    });

    const r1 = $('suggRow1'); r1.innerHTML = '';
    const r2 = $('suggRow2'); r2.innerHTML = '';
    suggestions.slice(0, 3).forEach((s, i) => r1.appendChild(suggBtn(s, 'sg-' + i)));
    suggestions.slice(3, 5).forEach((s, i) => r2.appendChild(suggBtn(s, 'sg-' + (i + 3))));

    const fb = $('fbRow'); fb.innerHTML = '';
    FALLBACKS.forEach((s, i) => {
      const b = document.createElement('button');
      b.className = 'focusable fb';
      b.dataset.key = 'fb-' + i;
      b.textContent = s;
      b.disabled = busy;
      b.addEventListener('click', () => sendText(s));
      fb.appendChild(b);
    });

    const sys = $('sysRow'); sys.innerHTML = '';
    const hint = document.createElement('button');
    hint.className = 'focusable sys'; hint.dataset.key = 'hint';
    hint.textContent = 'HINT'; hint.disabled = busy;
    hint.addEventListener('click', askHint);
    sys.appendChild(hint);
    const reset = document.createElement('button');
    reset.className = 'focusable sys'; reset.dataset.key = 'reset';
    reset.textContent = 'RESET'; reset.disabled = busy;
    reset.addEventListener('click', () => switchCategory(stateObj.category));
    sys.appendChild(reset);

    let target = null;
    if (prevFocus) target = document.querySelector(`[data-key="${prevFocus}"]:not(:disabled)`);
    if (!target) {
      target = document.querySelector('[data-key="sg-0"]:not(:disabled)')
            || document.querySelector('[data-key="cat-' + stateObj.category + '"]')
            || document.querySelector('.focusable:not(:disabled)');
    }
    if (target) target.focus();
  }

  function setStatus(state) { $('dot').className = 'dot ' + state; }

  async function sendText(text) {
    if (busy) return;
    busy = true; setStatus('thinking');
    suggestions = [];
    renderActions();
    try {
      await fetch('/api/say', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
    } catch (e) { setStatus('error'); busy = false; }
  }
  async function askHint() {
    if (busy) return;
    busy = true; setStatus('thinking'); renderActions();
    try { await fetch('/api/hint', { method: 'POST' }); }
    catch { setStatus('error'); busy = false; }
  }
  async function switchCategory(cat) {
    if (busy) return;
    busy = true; setStatus('thinking');
    try {
      await fetch('/api/category', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: cat }),
      });
    } catch { setStatus('error'); busy = false; }
  }

  function connect() {
    const es = new EventSource('/api/events');
    es.onopen  = () => setStatus('live');
    es.onerror = () => {
      setStatus('error');
      setTimeout(() => { try { es.close(); } catch {} connect(); }, 2000);
    };
    es.onmessage = ev => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'snapshot') {
        history     = m.history     || [];
        suggestions = m.suggestions || [];
        if (m.state) stateObj = m.state;
        busy = false;
        setStatus('live');
        renderTop(); renderChat(); renderActions();
      } else if (m.type === 'append') {
        history.push(m.message);
        if (m.state) stateObj = m.state;
        renderTop(); renderChat();
        if (m.message.role === 'assistant') { busy = false; setStatus('live'); }
      } else if (m.type === 'suggestions') {
        suggestions = m.suggestions || [];
        busy = false; setStatus('live');
        renderActions();
      }
    };
  }
  connect();

  function moveFocus(dir) {
    const list = Array.from(document.querySelectorAll('.focusable:not(:disabled)'));
    if (!list.length) return;
    const cur = list.indexOf(document.activeElement);
    let next;
    if (cur === -1) next = 0;
    else next = (cur + (dir > 0 ? 1 : -1) + list.length) % list.length;
    list[next].focus();
  }
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowDown':
      case 'ArrowRight': moveFocus(+1); break;
      case 'ArrowUp':
      case 'ArrowLeft':  moveFocus(-1); break;
      case 'Enter':
        if (document.activeElement && document.activeElement.classList.contains('focusable')) {
          document.activeElement.click();
        }
        break;
      default: return;
    }
    e.preventDefault();
  });

  renderTop(); renderChat(); renderActions();
</script>
</body>
</html>
