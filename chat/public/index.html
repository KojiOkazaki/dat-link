<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
<title>Interview</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 600px;
    height: 600px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue",
                 "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage {
    width: 600px;
    height: 600px;
    display: grid;
    grid-template-rows: 30px 1fr auto;
    padding: 12px 20px 16px;
    gap: 10px;
    position: relative;
  }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.42em;
    font-weight: 500;
    color: #7cf6c8;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2f3a;
    transition: all 0.3s ease;
  }
  .dot.live     { background: #7cf6c8; box-shadow: 0 0 10px #7cf6c8; }
  .dot.thinking { background: #ffce5b; box-shadow: 0 0 10px #ffce5b;
                  animation: pulse 1.1s ease-in-out infinite; }
  .dot.error    { background: #ff5b6e; box-shadow: 0 0 10px #ff5b6e; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  /* ---------- main content ---------- */
  .content {
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* flex-start avoids the well-known flex+overflow centering bug where
       the top of the content gets clipped beyond reach of scrolling. */
    justify-content: flex-start;
    text-align: center;
    gap: 6px;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-behavior: smooth;
    position: relative;
    padding: 8px 0 4px;
  }
  .content::-webkit-scrollbar { display: none; }

  .scroll-hint {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #7cf6c8;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
    text-shadow: 0 0 8px #7cf6c8;
    z-index: 5;
  }
  .scroll-hint.up   { top: 62px; }
  .scroll-hint.down { /* placed dynamically above the grid */
                      bottom: 240px; }
  .scroll-hint.on   { opacity: 0.65; animation: float 1.6s ease-in-out infinite; }
  @keyframes float {
    50% { transform: translate(-50%, 3px); }
  }
  .label {
    font-size: 10px;
    letter-spacing: 0.32em;
    color: #7cf6c8;
    text-transform: uppercase;
    opacity: 0.7;
    margin: 0;
  }
  .msg {
    font-size: 19px;
    font-weight: 300;
    line-height: 1.42;
    letter-spacing: 0.01em;
    color: #fff;
    max-width: 100%;
    text-wrap: balance;
    padding: 0 6px;
    animation: rise 0.32s cubic-bezier(.2,.7,.2,1);
  }
  .msg.long    { font-size: 18px; line-height: 1.45; }
  .msg.xlong   { font-size: 17px; line-height: 1.5;  text-align: left; }
  .msg.xxlong  { font-size: 16px; line-height: 1.55; text-align: left; }
  .msg.xxxlong { font-size: 16px; line-height: 1.6;  text-align: left; }
  .msg.hint  { color: #ffe8a8; font-weight: 300; }
  .msg.hint .lead { color: #ffce5b; letter-spacing: 0.2em; font-size: 11px;
                    display: block; margin-bottom: 6px; }
  .msg.end   { color: #ffe8a8; font-weight: 300; white-space: pre-line;
               text-align: left; max-width: 92%; }
  .label.end { color: #ffce5b; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .echo {
    font-size: 13px;
    color: #555;
    letter-spacing: 0.04em;
    max-width: 90%;
    text-wrap: balance;
  }
  .echo::before { content: "› "; color: #7cf6c8; opacity: 0.6; }

  .headline {
    font-size: 28px;
    font-weight: 200;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .subhead {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.18em;
  }

  /* ---------- 2x2 action grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: auto;
    gap: 8px;
  }
  .grid[data-cols="3"] { grid-template-columns: 1fr 1fr 1fr; }
  .grid[data-cols="3"] .focusable.cat { font-size: 15px; padding: 6px 4px; min-height: 72px; }

  .focusable {
    background: rgba(255, 255, 255, 0.025);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 12px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.4;
    letter-spacing: 0.01em;
    cursor: pointer;
    text-align: center;
    transition: all 130ms cubic-bezier(.2,.7,.2,1);
    word-break: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 72px;
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
  }
  .focusable:focus {
    outline: none;
    border-color: #7cf6c8;
    color: #7cf6c8;
    background: rgba(124, 246, 200, 0.10);
    box-shadow: 0 0 22px rgba(124, 246, 200, 0.35);
    transform: translateY(-1px);
  }
  .focusable:disabled,
  .focusable.empty {
    opacity: 0.18;
    cursor: default;
    pointer-events: none;
  }
  .focusable.chip {
    /* big enough to hold a full 60-char Japanese suggestion */
    min-height: 116px;
    font-size: 14px;
    line-height: 1.5;
    padding: 8px 12px;
  }
  .focusable.sys {
    font-size: 12px;
    letter-spacing: 0.22em;
    color: #8a93a3;
    min-height: 60px;
  }
  .focusable.sys:focus { color: #7cf6c8; }
  .focusable.cat {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.04em;
  }
  .focusable.full {
    grid-column: 1 / -1;
  }
</style>
</head>
<body>
<div class="stage">

  <header class="topbar">
    <div class="brand">面接</div>
    <span class="dot" id="dot"></span>
  </header>

  <main class="content" id="content"></main>
  <div class="scroll-hint up"   id="hintUp">▲</div>
  <div class="scroll-hint down" id="hintDown">▼</div>

  <div class="grid" id="grid"></div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const content = $('content');
  const grid    = $('grid');

  const CATS = [
    { id: 'self_pr',    label: '自己PR' },
    { id: 'gakuchika',  label: 'ガクチカ' },
    { id: 'motivation', label: '志望動機' },
  ];

  let history     = [];
  let suggestions = [];
  let stateObj    = { category: 'self_pr', questionNum: 0 };
  let busy        = false;
  let screen      = 'loading';   // loading | category | answer | menu
  let echoText    = '';          // last user-picked reply, shown while waiting

  /* ---------- TTS (server-streamed MP3 → glasses speakers) ---------- */
  // Audio is requested from /api/tts as MP3 and played through a single
  // persistent <audio> element. Whatever device loaded the page (the
  // glasses) is the one that plays the sound, so MRBD always speaks
  // even when there is no Japanese voice installed in its browser.
  // ttsEnabled is per-browser (localStorage) so the Mac preview tab
  // can be silenced without affecting the MRBD app.
  let ttsToken  = 0;
  let ttsEnabled = (() => {
    try { return localStorage.getItem('tts') !== 'off'; }
    catch { return true; }
  })();
  const ttsPlayer = new Audio();
  ttsPlayer.preload = 'auto';

  function setTtsEnabled(on) {
    ttsEnabled = !!on;
    try { localStorage.setItem('tts', ttsEnabled ? 'on' : 'off'); } catch {}
    if (!ttsEnabled) stopSpeaking();
  }

  function splitJaForTTS(text, maxLen = 180) {
    const cleaned = text.replace(/^HINT:\s*/, '').replace(/[【】]/g, '、').trim();
    if (cleaned.length <= maxLen) return [cleaned];
    const parts = cleaned.split(/(?<=[。！？\n])/);
    const out = [];
    let cur = '';
    for (const p of parts) {
      if ((cur + p).length > maxLen) {
        if (cur.trim()) out.push(cur);
        cur = p;
      } else {
        cur += p;
      }
    }
    if (cur.trim()) out.push(cur);
    return out;
  }

  async function speakJa(text) {
    if (!text || !ttsEnabled) return;
    stopSpeaking();
    const myToken = ++ttsToken;
    const chunks  = splitJaForTTS(text);
    for (const chunk of chunks) {
      if (myToken !== ttsToken) return;          // user interrupted
      if (!chunk.trim()) continue;
      ttsPlayer.src = '/api/tts?text=' + encodeURIComponent(chunk);
      try {
        await ttsPlayer.play();
        await new Promise((resolve) => {
          ttsPlayer.onended = resolve;
          ttsPlayer.onerror = resolve;
        });
      } catch (_) {
        // Autoplay block or network error — bail out quietly.
        return;
      }
    }
  }

  function stopSpeaking() {
    ttsToken++;
    try {
      ttsPlayer.pause();
      ttsPlayer.removeAttribute('src');
      ttsPlayer.load();
    } catch (_) {}
  }

  /* ---------- helpers ---------- */
  function setStatus(s) { $('dot').className = 'dot ' + s; }

  function lastAssistant() {
    for (let i = history.length - 1; i >= 0; i--) {
      if (history[i].role === 'assistant') return history[i];
    }
    return null;
  }

  function msgSizeClass(text) {
    const n = (text || '').length;
    if (n > 220) return 'xxxlong';
    if (n > 140) return 'xxlong';
    if (n > 80)  return 'xlong';
    if (n > 40)  return 'long';
    return '';
  }

  function canScrollDown() {
    const c = $('content');
    return c.scrollHeight > c.clientHeight + 1
        && c.scrollTop + c.clientHeight < c.scrollHeight - 1;
  }

  function canScrollUp() {
    return $('content').scrollTop > 1;
  }

  function stepScroll(dir) {
    const c = $('content');
    const step = Math.round(c.clientHeight * 0.35); // ~35% of viewport per swipe
    if (dir === 'down') c.scrollTop = Math.min(c.scrollHeight, c.scrollTop + step);
    else                c.scrollTop = Math.max(0, c.scrollTop - step);
  }

  function updateScrollHints() {
    const c = $('content');
    const hasOverflow = c.scrollHeight > c.clientHeight + 1;
    const atTop      = c.scrollTop <= 1;
    const atBottom   = c.scrollTop + c.clientHeight >= c.scrollHeight - 1;
    $('hintUp').classList.toggle('on',   hasOverflow && !atTop);
    $('hintDown').classList.toggle('on', hasOverflow && !atBottom);
  }

  /* ---------- main content ---------- */
  function renderContent() {
    content.innerHTML = '';

    if (screen === 'loading') {
      const h = document.createElement('div');
      h.className = 'subhead';
      h.textContent = '接続中…';
      content.appendChild(h);
      return;
    }

    if (screen === 'category') {
      const lead = document.createElement('div');
      lead.className = 'label';
      lead.textContent = 'テーマを選んでください';
      const head = document.createElement('div');
      head.className = 'headline';
      head.textContent = '模擬面接';
      const sub = document.createElement('div');
      sub.className = 'subhead';
      sub.textContent = 'Gemma · スマホ連携';
      content.appendChild(lead);
      content.appendChild(head);
      content.appendChild(sub);
      return;
    }

    if (screen === 'menu') {
      const lead = document.createElement('div');
      lead.className = 'label';
      lead.textContent = 'メニュー';
      const head = document.createElement('div');
      head.className = 'headline';
      head.textContent = '…';
      const sub = document.createElement('div');
      sub.className = 'subhead';
      const cat = CATS.find(c => c.id === stateObj.category);
      sub.textContent = (cat ? cat.label : '—') + ' · 第' + (stateObj.questionNum || 0) + '問';
      content.appendChild(lead);
      content.appendChild(head);
      content.appendChild(sub);
      return;
    }

    if (screen === 'ended') {
      const endMsg = [...history].reverse().find(m => m.kind === 'end');
      const lead = document.createElement('div');
      lead.className = 'label end';
      lead.textContent = 'フィードバック';
      content.appendChild(lead);
      const body = document.createElement('div');
      body.className = 'msg end ' + msgSizeClass(endMsg ? endMsg.content : '');
      body.textContent = endMsg ? endMsg.content : '(フィードバックがありません)';
      content.appendChild(body);
      const sub = document.createElement('div');
      sub.className = 'subhead';
      sub.textContent = '別のテーマでもう一度';
      content.appendChild(sub);
      return;
    }

    // screen === 'answer'
    const m = lastAssistant();
    if (!m) {
      const e = document.createElement('div');
      e.className = 'subhead';
      e.textContent = '面接官の応答を待っています…';
      content.appendChild(e);
      return;
    }

    const kindClass = m.kind === 'hint' ? ' hint' : (m.kind === 'end' ? ' end' : '');
    const lead = document.createElement('div');
    lead.className = 'label' + (m.kind === 'end' ? ' end' : '');
    lead.textContent = m.kind === 'hint' ? 'ヒント' : (m.kind === 'end' ? 'フィードバック' : '面接官');
    content.appendChild(lead);

    const body = document.createElement('div');
    const text = m.content.replace(/^HINT:\s*/, '');
    body.className = 'msg ' + msgSizeClass(text) + kindClass;
    body.textContent = text;
    content.appendChild(body);

    if (busy && echoText) {
      const e = document.createElement('div');
      e.className = 'echo';
      e.textContent = echoText.length > 38 ? echoText.slice(0, 38) + '…' : echoText;
      content.appendChild(e);
    }
  }

  /* ---------- 2x2 action grid ---------- */
  function btn(text, opts) {
    const b = document.createElement('button');
    b.className = 'focusable' + (opts.cls ? ' ' + opts.cls : '');
    b.dataset.key = opts.key;
    b.textContent = text;
    if (opts.disabled) b.disabled = true;
    if (opts.onClick)  b.addEventListener('click', opts.onClick);
    return b;
  }

  function placeholderBtn(key) {
    const b = document.createElement('div');
    b.className = 'focusable empty';
    b.dataset.key = key;
    return b;
  }

  function renderGrid() {
    const prevKey = document.activeElement && document.activeElement.dataset
                    ? document.activeElement.dataset.key : null;
    grid.innerHTML = '';

    let buttons = [];
    let cols    = 2;

    if (screen === 'category' || screen === 'ended') {
      // 3 categories on a single horizontal row so the feedback or
      // category headline above has room to breathe.
      cols = 3;
      buttons = CATS.map(c => btn(c.label, {
        cls: 'cat',
        key: 'cat-' + c.id,
        disabled: busy,
        onClick: () => switchCategory(c.id),
      }));
    } else if (screen === 'menu') {
      buttons = [
        btn('ヒント',     { cls: 'sys', key: 'hint',  disabled: busy, onClick: askHint }),
        btn('終了',       { cls: 'sys', key: 'end',   disabled: busy, onClick: endInterview }),
        btn('テーマ変更', { cls: 'sys', key: 'cat',   onClick: () => { screen = 'category'; render(); } }),
        btn('戻る',       { cls: 'sys', key: 'back',  onClick: () => { screen = 'answer'; render(); } }),
        btn('音声 ' + (ttsEnabled ? 'ON' : 'OFF'), {
          cls: 'sys full', key: 'tts',
          onClick: () => { setTtsEnabled(!ttsEnabled); renderGrid(); },
        }),
      ];
    } else {
      const s = suggestions.slice(0, 2);
      buttons = s.map((txt, i) => btn(txt, {
        cls: 'chip',
        key: 'sg-' + i,
        disabled: busy,
        onClick: () => pickReply(txt),
      }));
      while (buttons.length < 2) {
        buttons.push(placeholderBtn('sg-' + buttons.length));
      }
      buttons.push(btn('メニュー', {
        cls: 'sys full',
        key: 'menu',
        onClick: () => { screen = 'menu'; render(); },
      }));
    }

    grid.dataset.cols = String(cols);
    buttons.forEach(b => grid.appendChild(b));

    const all = Array.from(grid.querySelectorAll('.focusable:not(:disabled):not(.empty)'));
    if (!all.length) return;
    let target = prevKey ? all.find(b => b.dataset.key === prevKey) : null;
    if (!target) target = all[0];
    target.focus();
  }

  function render(opts) {
    renderContent();
    renderGrid();
    requestAnimationFrame(() => {
      if (!opts || opts.resetScroll !== false) $('content').scrollTop = 0;
      updateScrollHints();
    });
  }

  $('content').addEventListener('scroll', updateScrollHints);
  window.addEventListener('resize', () => {
    updateScrollHints();
    renderGrid();
  });

  /* ---------- API ---------- */
  async function pickReply(text) {
    if (busy) return;
    busy = true;
    stopSpeaking();
    echoText = text;
    suggestions = [];
    setStatus('thinking');
    render();
    try {
      await fetch('/api/say', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
    } catch { setStatus('error'); busy = false; render(); }
  }

  async function askHint() {
    if (busy) return;
    busy = true; setStatus('thinking'); screen = 'answer'; render();
    try { await fetch('/api/hint', { method: 'POST' }); }
    catch { setStatus('error'); busy = false; render(); }
  }

  async function endInterview() {
    if (busy) return;
    busy = true; setStatus('thinking'); screen = 'answer'; render();
    try { await fetch('/api/end', { method: 'POST' }); }
    catch { setStatus('error'); busy = false; render(); }
  }

  async function switchCategory(cat) {
    if (busy) return;
    stopSpeaking();
    busy = true; setStatus('thinking'); screen = 'answer'; echoText = '';
    render();
    try {
      await fetch('/api/category', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: cat }),
      });
    } catch { setStatus('error'); busy = false; render(); }
  }

  /* ---------- SSE ---------- */
  function connect() {
    const es = new EventSource('/api/events');
    es.onopen  = () => setStatus('live');
    es.onerror = () => {
      setStatus('error');
      setTimeout(() => { try { es.close(); } catch {} connect(); }, 2000);
    };
    es.onmessage = ev => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }

      if (m.type === 'snapshot') {
        history     = m.history     || [];
        suggestions = m.suggestions || [];
        if (m.state) stateObj = m.state;
        busy = false;
        echoText = '';
        setStatus('live');
        if (stateObj.ended)        screen = 'ended';
        else if (!history.length)  screen = 'category';
        else if (screen === 'loading') screen = 'answer';
        render();
      } else if (m.type === 'append') {
        history.push(m.message);
        if (m.state) stateObj = m.state;
        if (m.message.role === 'assistant') {
          busy = false;
          echoText = '';
          setStatus('live');
          if (m.message.kind === 'end' || stateObj.ended) screen = 'ended';
          else if (screen !== 'menu' && screen !== 'category') screen = 'answer';
          // Speak the interviewer's turn aloud through the glasses speakers.
          speakJa(m.message.content);
        }
        render();
      } else if (m.type === 'suggestions') {
        suggestions = m.suggestions || [];
        busy = false;
        setStatus('live');
        renderGrid();
      }
    };
  }
  connect();

  /* ---------- D-pad (2x2 grid aware) ---------- */
  // Spatial nav using getBoundingClientRect so it works regardless of
  // whether cells are half-width or span the row (.full).
  function navigate(dir) {
    const cells = Array.from(grid.querySelectorAll('.focusable:not(:disabled):not(.empty)'));
    if (!cells.length) return;
    const cur = document.activeElement;
    if (!cells.includes(cur)) { cells[0].focus(); return; }

    const rects = cells.map(c => c.getBoundingClientRect());
    const rows = [];
    rects.forEach((r, i) => {
      const row = rows.find(rr => Math.abs(rects[rr[0]].top - r.top) < 10);
      if (row) row.push(i);
      else rows.push([i]);
    });
    rows.sort((a, b) => rects[a[0]].top - rects[b[0]].top);
    rows.forEach(r => r.sort((a, b) => rects[a].left - rects[b].left));

    const curIdx = cells.indexOf(cur);
    let curRow = -1, curCol = -1;
    for (let i = 0; i < rows.length; i++) {
      const j = rows[i].indexOf(curIdx);
      if (j !== -1) { curRow = i; curCol = j; break; }
    }
    if (curRow === -1) { cells[0].focus(); return; }

    // Vertical moves at the boundary fall through to content scrolling first.
    const c = $('content');
    const overflow = c.scrollHeight > c.clientHeight + 1;
    if (dir === 'up' && curRow === 0 && overflow && c.scrollTop > 1) {
      stepScroll('up'); return;
    }
    if (dir === 'down' && curRow === rows.length - 1
        && overflow && c.scrollTop + c.clientHeight < c.scrollHeight - 1) {
      stepScroll('down'); return;
    }

    if (dir === 'up' || dir === 'down') {
      const targetRow = (curRow + (dir === 'down' ? 1 : -1) + rows.length) % rows.length;
      const curCenter = rects[curIdx].left + rects[curIdx].width / 2;
      let best = rows[targetRow][0], bestDist = Infinity;
      for (const t of rows[targetRow]) {
        const center = rects[t].left + rects[t].width / 2;
        const d = Math.abs(curCenter - center);
        if (d < bestDist) { bestDist = d; best = t; }
      }
      cells[best].focus();
    } else {
      const row = rows[curRow];
      const ci  = row.indexOf(curIdx);
      const t   = (ci + (dir === 'right' ? 1 : -1) + row.length) % row.length;
      cells[row[t]].focus();
    }
  }

  // Up/Down swipes from the Neural Band scroll the long content first
  // and only navigate focus once the content is fully read. Left/Right
  // always moves focus.
  function handleVertical(dir) {
    const c = $('content');
    const overflow = c.scrollHeight > c.clientHeight + 1;
    if (overflow) {
      if (dir === 'down' && c.scrollTop + c.clientHeight < c.scrollHeight - 2) {
        stepScroll('down');
        return;
      }
      if (dir === 'up' && c.scrollTop > 2) {
        stepScroll('up');
        return;
      }
    }
    navigate(dir);
  }

  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':    handleVertical('up');   break;
      case 'ArrowDown':  handleVertical('down'); break;
      case 'ArrowLeft':  navigate('left');       break;
      case 'ArrowRight': navigate('right');      break;
      case 'Enter':
        if (document.activeElement && document.activeElement.classList.contains('focusable')
            && !document.activeElement.disabled
            && !document.activeElement.classList.contains('empty')) {
          document.activeElement.click();
        }
        break;
      case 'Escape':
        if (screen === 'menu' || screen === 'category') {
          if (history.length) { screen = 'answer'; render(); }
        }
        break;
      default: return;
    }
    e.preventDefault();
  });

  /* initial */
  render();
</script>
</body>
</html>
