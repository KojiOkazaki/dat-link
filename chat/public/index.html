<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
<title>Interview</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 600px;
    height: 600px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue",
                 "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage {
    width: 600px;
    height: 600px;
    display: grid;
    grid-template-rows: 38px 1fr auto;
    padding: 18px 24px 22px;
    gap: 14px;
  }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.42em;
    font-weight: 500;
    color: #7cf6c8;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2f3a;
    transition: all 0.3s ease;
  }
  .dot.live     { background: #7cf6c8; box-shadow: 0 0 10px #7cf6c8; }
  .dot.thinking { background: #ffce5b; box-shadow: 0 0 10px #ffce5b;
                  animation: pulse 1.1s ease-in-out infinite; }
  .dot.error    { background: #ff5b6e; box-shadow: 0 0 10px #ff5b6e; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  /* ---------- main content ---------- */
  .content {
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    overflow: hidden;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.32em;
    color: #7cf6c8;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .msg {
    font-size: 32px;
    font-weight: 300;
    line-height: 1.35;
    letter-spacing: 0.01em;
    color: #fff;
    max-width: 100%;
    text-wrap: balance;
    animation: rise 0.32s cubic-bezier(.2,.7,.2,1);
  }
  .msg.long  { font-size: 26px; line-height: 1.4; }
  .msg.xlong { font-size: 22px; line-height: 1.45; }
  .msg.hint  { color: #ffe8a8; font-weight: 300; }
  .msg.hint .lead { color: #ffce5b; letter-spacing: 0.2em; font-size: 11px;
                    display: block; margin-bottom: 6px; }
  .msg.end   { color: #ffe8a8; font-weight: 300; white-space: pre-line;
               text-align: left; max-width: 92%; }
  .label.end { color: #ffce5b; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .echo {
    font-size: 13px;
    color: #555;
    letter-spacing: 0.04em;
    max-width: 90%;
    text-wrap: balance;
  }
  .echo::before { content: "› "; color: #7cf6c8; opacity: 0.6; }

  .headline {
    font-size: 38px;
    font-weight: 200;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .subhead {
    font-size: 13px;
    color: #555;
    letter-spacing: 0.18em;
  }

  /* ---------- 2x2 action grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 88px;
    gap: 10px;
  }
  .focusable {
    background: rgba(255, 255, 255, 0.025);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 14px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.3;
    letter-spacing: 0.02em;
    cursor: pointer;
    text-align: center;
    transition: all 130ms cubic-bezier(.2,.7,.2,1);
    word-break: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
  }
  .focusable:focus {
    outline: none;
    border-color: #7cf6c8;
    color: #7cf6c8;
    background: rgba(124, 246, 200, 0.10);
    box-shadow: 0 0 22px rgba(124, 246, 200, 0.35);
    transform: translateY(-1px);
  }
  .focusable:disabled,
  .focusable.empty {
    opacity: 0.18;
    cursor: default;
    pointer-events: none;
  }
  .focusable.sys {
    font-size: 13px;
    letter-spacing: 0.22em;
    color: #8a93a3;
  }
  .focusable.sys:focus { color: #7cf6c8; }
  .focusable.cat {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.06em;
  }
  .focusable .ic {
    font-size: 18px;
    margin-right: 8px;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="stage">

  <header class="topbar">
    <div class="brand">INTERVIEW</div>
    <span class="dot" id="dot"></span>
  </header>

  <main class="content" id="content"></main>

  <div class="grid" id="grid"></div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const content = $('content');
  const grid    = $('grid');

  const CATS = [
    { id: 'self_pr',    label: '自己PR',   ic: '◇' },
    { id: 'gakuchika',  label: 'ガクチカ', ic: '◈' },
    { id: 'motivation', label: '志望動機', ic: '◉' },
    { id: 'reverse',    label: '逆質問',   ic: '◐' },
  ];

  let history     = [];
  let suggestions = [];
  let stateObj    = { category: 'self_pr', questionNum: 0 };
  let busy        = false;
  let screen      = 'loading';   // loading | category | answer | menu
  let echoText    = '';          // last user-picked reply, shown while waiting

  /* ---------- helpers ---------- */
  function setStatus(s) { $('dot').className = 'dot ' + s; }

  function lastAssistant() {
    for (let i = history.length - 1; i >= 0; i--) {
      if (history[i].role === 'assistant') return history[i];
    }
    return null;
  }

  function msgSizeClass(text) {
    const n = (text || '').length;
    if (n > 110) return 'xlong';
    if (n > 60)  return 'long';
    return '';
  }

  /* ---------- main content ---------- */
  function renderContent() {
    content.innerHTML = '';

    if (screen === 'loading') {
      const h = document.createElement('div');
      h.className = 'subhead';
      h.textContent = 'CONNECTING…';
      content.appendChild(h);
      return;
    }

    if (screen === 'category') {
      const lead = document.createElement('div');
      lead.className = 'label';
      lead.textContent = 'CHOOSE YOUR FOCUS';
      const head = document.createElement('div');
      head.className = 'headline';
      head.textContent = 'Interview';
      const sub = document.createElement('div');
      sub.className = 'subhead';
      sub.textContent = 'GEMMA · POWERED BY YOUR PHONE';
      content.appendChild(lead);
      content.appendChild(head);
      content.appendChild(sub);
      return;
    }

    if (screen === 'menu') {
      const lead = document.createElement('div');
      lead.className = 'label';
      lead.textContent = 'MENU';
      const head = document.createElement('div');
      head.className = 'headline';
      head.textContent = '…';
      const sub = document.createElement('div');
      sub.className = 'subhead';
      const cat = CATS.find(c => c.id === stateObj.category);
      sub.textContent = (cat ? cat.label.toUpperCase() : '—') + ' · Q' + (stateObj.questionNum || 0);
      content.appendChild(lead);
      content.appendChild(head);
      content.appendChild(sub);
      return;
    }

    if (screen === 'ended') {
      const endMsg = [...history].reverse().find(m => m.kind === 'end');
      const lead = document.createElement('div');
      lead.className = 'label end';
      lead.textContent = 'FEEDBACK';
      content.appendChild(lead);
      const body = document.createElement('div');
      body.className = 'msg end ' + msgSizeClass(endMsg ? endMsg.content : '');
      body.textContent = endMsg ? endMsg.content : '(no feedback)';
      content.appendChild(body);
      const sub = document.createElement('div');
      sub.className = 'subhead';
      sub.textContent = '別カテゴリでもう一度';
      content.appendChild(sub);
      return;
    }

    // screen === 'answer'
    const m = lastAssistant();
    if (!m) {
      const e = document.createElement('div');
      e.className = 'subhead';
      e.textContent = 'WAITING FOR INTERVIEWER…';
      content.appendChild(e);
      return;
    }

    const kindClass = m.kind === 'hint' ? ' hint' : (m.kind === 'end' ? ' end' : '');
    const lead = document.createElement('div');
    lead.className = 'label' + (m.kind === 'end' ? ' end' : '');
    lead.textContent = m.kind === 'hint' ? 'HINT' : (m.kind === 'end' ? 'FEEDBACK' : 'INTERVIEWER');
    content.appendChild(lead);

    const body = document.createElement('div');
    const text = m.content.replace(/^HINT:\s*/, '');
    body.className = 'msg ' + msgSizeClass(text) + kindClass;
    body.textContent = text;
    content.appendChild(body);

    if (busy && echoText) {
      const e = document.createElement('div');
      e.className = 'echo';
      e.textContent = echoText.length > 38 ? echoText.slice(0, 38) + '…' : echoText;
      content.appendChild(e);
    }
  }

  /* ---------- 2x2 action grid ---------- */
  function btn(text, opts) {
    const b = document.createElement('button');
    b.className = 'focusable' + (opts.cls ? ' ' + opts.cls : '');
    b.dataset.key = opts.key;
    b.textContent = text;
    if (opts.disabled) b.disabled = true;
    if (opts.onClick)  b.addEventListener('click', opts.onClick);
    return b;
  }

  function placeholderBtn(key) {
    const b = document.createElement('div');
    b.className = 'focusable empty';
    b.dataset.key = key;
    return b;
  }

  function renderGrid() {
    const prevKey = document.activeElement && document.activeElement.dataset
                    ? document.activeElement.dataset.key : null;
    grid.innerHTML = '';

    let buttons = [];

    if (screen === 'category' || screen === 'ended') {
      buttons = CATS.map(c => btn(c.label, {
        cls: 'cat',
        key: 'cat-' + c.id,
        disabled: busy,
        onClick: () => switchCategory(c.id),
      }));
    } else if (screen === 'menu') {
      buttons = [
        btn('HINT',     { cls: 'sys', key: 'hint',  disabled: busy, onClick: askHint }),
        btn('END',      { cls: 'sys', key: 'end',   disabled: busy, onClick: endInterview }),
        btn('CATEGORY', { cls: 'sys', key: 'cat',   onClick: () => { screen = 'category'; render(); } }),
        btn('CANCEL',   { cls: 'sys', key: 'back',  onClick: () => { screen = 'answer'; render(); } }),
      ];
    } else {
      // screen === 'answer' (or 'loading' fallback)
      const s = suggestions.slice(0, 3);
      buttons = s.map((txt, i) => btn(txt, {
        key: 'sg-' + i,
        disabled: busy,
        onClick: () => pickReply(txt),
      }));
      while (buttons.length < 3) {
        buttons.push(placeholderBtn('sg-' + buttons.length));
      }
      buttons.push(btn('MENU', {
        cls: 'sys', key: 'menu',
        onClick: () => { screen = 'menu'; render(); },
      }));
    }

    buttons.forEach(b => grid.appendChild(b));

    // restore focus
    const all = Array.from(grid.querySelectorAll('.focusable:not(:disabled):not(.empty)'));
    if (!all.length) return;
    let target = prevKey ? all.find(b => b.dataset.key === prevKey) : null;
    if (!target) target = all[0];
    target.focus();
  }

  function render() {
    renderContent();
    renderGrid();
  }

  /* ---------- API ---------- */
  async function pickReply(text) {
    if (busy) return;
    busy = true;
    echoText = text;
    suggestions = [];
    setStatus('thinking');
    render();
    try {
      await fetch('/api/say', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
    } catch { setStatus('error'); busy = false; render(); }
  }

  async function askHint() {
    if (busy) return;
    busy = true; setStatus('thinking'); screen = 'answer'; render();
    try { await fetch('/api/hint', { method: 'POST' }); }
    catch { setStatus('error'); busy = false; render(); }
  }

  async function endInterview() {
    if (busy) return;
    busy = true; setStatus('thinking'); screen = 'answer'; render();
    try { await fetch('/api/end', { method: 'POST' }); }
    catch { setStatus('error'); busy = false; render(); }
  }

  async function switchCategory(cat) {
    if (busy) return;
    busy = true; setStatus('thinking'); screen = 'answer'; echoText = '';
    render();
    try {
      await fetch('/api/category', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: cat }),
      });
    } catch { setStatus('error'); busy = false; render(); }
  }

  /* ---------- SSE ---------- */
  function connect() {
    const es = new EventSource('/api/events');
    es.onopen  = () => setStatus('live');
    es.onerror = () => {
      setStatus('error');
      setTimeout(() => { try { es.close(); } catch {} connect(); }, 2000);
    };
    es.onmessage = ev => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }

      if (m.type === 'snapshot') {
        history     = m.history     || [];
        suggestions = m.suggestions || [];
        if (m.state) stateObj = m.state;
        busy = false;
        echoText = '';
        setStatus('live');
        if (stateObj.ended)        screen = 'ended';
        else if (!history.length)  screen = 'category';
        else if (screen === 'loading') screen = 'answer';
        render();
      } else if (m.type === 'append') {
        history.push(m.message);
        if (m.state) stateObj = m.state;
        if (m.message.role === 'assistant') {
          busy = false;
          echoText = '';
          setStatus('live');
          if (m.message.kind === 'end' || stateObj.ended) screen = 'ended';
          else if (screen !== 'menu' && screen !== 'category') screen = 'answer';
        }
        render();
      } else if (m.type === 'suggestions') {
        suggestions = m.suggestions || [];
        busy = false;
        setStatus('live');
        renderGrid();
      }
    };
  }
  connect();

  /* ---------- D-pad (2x2 grid aware) ---------- */
  function navigate(dir) {
    const all = Array.from(grid.querySelectorAll('.focusable:not(:disabled):not(.empty)'));
    if (!all.length) return;
    const cur = all.indexOf(document.activeElement);
    if (cur === -1) { all[0].focus(); return; }

    // Map grid index to row/col assuming 2 cols
    const allCells = Array.from(grid.querySelectorAll('.focusable'));
    const idxInGrid = allCells.indexOf(document.activeElement);
    const row = Math.floor(idxInGrid / 2);
    const col = idxInGrid % 2;

    let targetIdx;
    if (dir === 'left' || dir === 'right') {
      targetIdx = row * 2 + (col === 0 ? 1 : 0);
    } else { // up/down: swap row (in 2-row grid up==down)
      const otherRow = (row + 1) % Math.ceil(allCells.length / 2);
      targetIdx = otherRow * 2 + col;
    }
    const candidate = allCells[targetIdx];
    if (candidate && !candidate.disabled && !candidate.classList.contains('empty')) {
      candidate.focus();
      return;
    }
    // Fallback: linear next/prev among interactive
    const delta = (dir === 'right' || dir === 'down') ? 1 : -1;
    const next = all[(cur + delta + all.length) % all.length];
    next.focus();
  }

  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':    navigate('up');    break;
      case 'ArrowDown':  navigate('down');  break;
      case 'ArrowLeft':  navigate('left');  break;
      case 'ArrowRight': navigate('right'); break;
      case 'Enter':
        if (document.activeElement && document.activeElement.classList.contains('focusable')
            && !document.activeElement.disabled
            && !document.activeElement.classList.contains('empty')) {
          document.activeElement.click();
        }
        break;
      case 'Escape':
        if (screen === 'menu' || screen === 'category') {
          if (history.length) { screen = 'answer'; render(); }
        }
        break;
      default: return;
    }
    e.preventDefault();
  });

  /* initial */
  render();
</script>
</body>
</html>
