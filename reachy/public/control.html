<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Reachy · Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100%;
    background:
      radial-gradient(circle at 20% 0%,  rgba(124, 246, 200, 0.10), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(91, 141, 239, 0.08), transparent 50%),
      #0a0e14;
    color: #fff;
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  .app { max-width: 560px; margin: 0 auto; padding: max(env(safe-area-inset-top), 14px) 14px 28px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 12px; }
  .title { font-size: 14px; letter-spacing: 0.26em; color: #7cf6c8; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.16em; color: #8a93a3; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #555; }
  .dot.live  { background: #7cf6c8; box-shadow: 0 0 8px #7cf6c8; }
  .dot.error { background: #ff5b6e; box-shadow: 0 0 8px #ff5b6e; }

  .latest {
    border: 1px solid rgba(124, 246, 200, 0.25);
    background: rgba(255, 255, 255, 0.04);
    border-radius: 16px; padding: 14px 16px; margin-bottom: 16px;
    min-height: 64px; display: flex; align-items: center; gap: 12px;
  }
  .latest .face { font-size: 34px; }
  .latest .txt  { font-size: 17px; line-height: 1.4; color: #e8fff4; }
  .latest .txt.empty { color: #555; font-size: 14px; letter-spacing: 0.1em; }

  .section { font-size: 11px; letter-spacing: 0.24em; color: #5b6472; text-transform: uppercase; margin: 14px 4px 8px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .row.two { grid-template-columns: repeat(2, 1fr); }
  button.cmd {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(124, 246, 200, 0.25);
    color: #e8fff4; border-radius: 14px; padding: 16px 8px;
    font-family: inherit; font-size: 15px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all 120ms ease;
  }
  button.cmd .gi { font-size: 24px; }
  button.cmd:active { background: rgba(124, 246, 200, 0.16); border-color: #7cf6c8; }
  button.cmd.stop { border-color: rgba(255, 91, 110, 0.5); color: #ff8a98; }
  button.cmd.stop:active { background: rgba(255, 91, 110, 0.16); border-color: #ff5b6e; }

  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: rgba(124, 246, 200, 0.16); border: 1px solid rgba(124, 246, 200, 0.4);
    color: #7cf6c8; padding: 10px 18px; border-radius: 999px; font-size: 14px;
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">REACHY · CONTROL</div>
    <div class="status"><span class="dot" id="dot"></span><span id="robotTxt">—</span></div>
  </div>

  <div class="latest">
    <div class="face" id="face">😴</div>
    <div class="txt empty" id="latest">発話を待っています…</div>
  </div>

  <div class="section">動き</div>
  <div class="row" id="move"></div>
  <div class="section">感情</div>
  <div class="row" id="emotion"></div>
  <div class="section">アクション</div>
  <div class="row two" id="action"></div>
  <div class="section">会話</div>
  <div class="row" id="conv"></div>
  <div class="section">安全</div>
  <div class="row two" id="safety"></div>
</div>
<div class="toast" id="toast"></div>

<script>
  const $ = id => document.getElementById(id);
  const EMO = { happy:'😊', thinking:'🤔', surprised:'😮', idle:'😴', excited:'🎉',
                friendly:'❤️', error:'⚠️', listening:'🎤', speaking:'💬', neutral:'🙂' };

  const MENUS = {
    move: [
      { cmd:'look_left',  label:'左',     icon:'⬅️' },
      { cmd:'look_right', label:'右',     icon:'➡️' },
      { cmd:'look_user',  label:'こっち', icon:'👀' },
      { cmd:'nod',        label:'うなずく', icon:'⬇️' },
      { cmd:'shake_head', label:'首振り', icon:'↔️' },
    ],
    emotion: [
      { cmd:'happy',     label:'喜ぶ',   icon:'😊' },
      { cmd:'surprised', label:'驚く',   icon:'😮' },
      { cmd:'thinking',  label:'考える', icon:'🤔' },
    ],
    action: [
      { cmd:'wave',  label:'手を振る', icon:'👋' },
      { cmd:'dance', label:'ダンス',   icon:'🎉' },
    ],
    conv: [
      { cmd:'start_conversation', label:'会話開始', icon:'💬' },
      { cmd:'pause_conversation', label:'会話停止', icon:'⏸️' },
      { cmd:'clear_text',         label:'クリア',   icon:'🧹' },
    ],
    safety: [
      { cmd:'idle', label:'待機',          icon:'😴' },
      { cmd:'stop', label:'停止 (STOP)',   icon:'■', cls:'stop' },
    ],
  };

  function build(rowId) {
    const row = $(rowId);
    for (const m of MENUS[rowId]) {
      const b = document.createElement('button');
      b.className = 'cmd' + (m.cls ? ' ' + m.cls : '');
      b.innerHTML = '<span class="gi">' + m.icon + '</span>' + m.label;
      b.addEventListener('click', () => send(m.cmd, m.label));
      row.appendChild(b);
    }
  }
  ['move','emotion','action','conv','safety'].forEach(build);

  let toastTimer = null;
  function toast(msg) {
    const el = $('toast'); el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1300);
  }

  async function send(cmd, label) {
    toast('送信: ' + label);
    try {
      await fetch('/api/command', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd }),
      });
    } catch (_) { toast('送信失敗'); }
  }

  function applyStatus(s) {
    if (!s) return;
    $('dot').className = 'dot ' + (s.connected ? 'live' : 'error');
    $('robotTxt').textContent = s.connected ? 'ON' : 'OFF';
    $('face').textContent = EMO[s.emotion] || EMO.neutral;
  }
  function showLatest(m) {
    const el = $('latest');
    if (m && m.text) { el.textContent = m.text; el.classList.remove('empty'); }
  }

  async function poll() {
    try {
      const r = await fetch('/api/snapshot', { cache: 'no-store' });
      if (!r.ok) throw new Error('http ' + r.status);
      const d = await r.json();
      applyStatus(d.status);
      if (d.latest) showLatest(d.latest);
      else { $('latest').textContent = '発話を待っています…'; $('latest').classList.add('empty'); }
    } catch (_) {
      $('dot').className = 'dot error';
    }
  }
  setInterval(poll, 1000);
  poll();
</script>
</body>
</html>
