<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>NeonInterview · Input</title>
<style>
  :root {
    --bg:       #05060a;
    --fg:       #e6f7ff;
    --mute:     #5b6678;
    --cyan:     #00f0ff;
    --magenta:  #ff2bd0;
    --yellow:   #fbff00;
    --green:    #00ff9f;
    --red:      #ff0044;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background:
      radial-gradient(circle at 18% 0%,  rgba(0, 240, 255, 0.10), transparent 55%),
      radial-gradient(circle at 82% 100%, rgba(255, 43, 208, 0.10), transparent 55%),
      var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', 'Fira Code', 'IBM Plex Mono',
                 'SF Mono', Menlo, Consolas, monospace;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  /* Subtle scan-lines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0 2px,
      rgba(255, 255, 255, 0.02) 2px 3px
    );
    mix-blend-mode: screen;
  }

  .app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ---------- top bar ---------- */
  .topbar {
    padding: max(env(safe-area-inset-top), 12px) 18px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0, 240, 255, 0.18);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    background: rgba(5, 6, 10, 0.7);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .title {
    font-size: 13px;
    letter-spacing: 0.42em;
    color: var(--cyan);
    font-weight: 700;
    text-shadow: 0 0 6px rgba(0, 240, 255, 0.55);
  }
  .title .accent { color: var(--magenta); }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--mute);
  }
  .dot {
    width: 8px;
    height: 8px;
    background: #1a1f29;
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  }
  .dot.live      { background: var(--cyan);    box-shadow: 0 0 8px var(--cyan); }
  .dot.thinking  { background: var(--yellow);  box-shadow: 0 0 8px var(--yellow); animation: pulse 1s infinite; }
  .dot.error     { background: var(--red);     box-shadow: 0 0 8px var(--red); }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ---------- chat ---------- */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 86%;
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.5;
    border: 1px solid rgba(0, 240, 255, 0.22);
    background: rgba(0, 240, 255, 0.04);
    clip-path: polygon(
      0 10px, 10px 0,
      100% 0, 100% calc(100% - 10px),
      calc(100% - 10px) 100%, 0 100%
    );
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    word-break: break-word;
    animation: rise 0.22s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    border-color: rgba(255, 43, 208, 0.55);
    background: rgba(255, 43, 208, 0.10);
    color: #ffe2f6;
  }
  .msg.assistant { align-self: flex-start; color: #e6f7ff; }
  .msg.hint {
    border-color: rgba(251, 255, 0, 0.45);
    background: rgba(251, 255, 0, 0.06);
    color: #fff9c4;
  }
  .msg .who {
    display: block;
    font-size: 9px;
    letter-spacing: 0.32em;
    color: var(--cyan);
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .msg.user .who { color: var(--magenta); text-align: right; }
  .msg.hint .who { color: var(--yellow); }

  .empty {
    margin: auto;
    color: var(--mute);
    font-size: 12px;
    letter-spacing: 0.32em;
  }

  /* ---------- suggestions ---------- */
  .suggs {
    padding: 0 16px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .sugg {
    flex: 1 1 auto;
    background: rgba(0, 240, 255, 0.05);
    border: 1px solid rgba(0, 240, 255, 0.32);
    color: #cdeeff;
    padding: 10px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 150ms ease;
    clip-path: polygon(
      0 8px, 8px 0,
      100% 0, 100% calc(100% - 8px),
      calc(100% - 8px) 100%, 0 100%
    );
  }
  .sugg:active {
    background: rgba(255, 43, 208, 0.18);
    color: var(--magenta);
    border-color: var(--magenta);
  }
  .sugg:disabled { opacity: 0.4; }

  /* ---------- composer ---------- */
  .composer {
    padding: 10px 12px max(env(safe-area-inset-bottom), 14px);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: rgba(5, 6, 10, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(0, 240, 255, 0.18);
  }
  .mic, .send {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border: 1px solid rgba(0, 240, 255, 0.35);
    background: rgba(0, 240, 255, 0.05);
    color: #cdeeff;
    font-size: 20px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 150ms ease;
    clip-path: polygon(
      0 10px, 10px 0,
      100% 0, 100% calc(100% - 10px),
      calc(100% - 10px) 100%, 0 100%
    );
  }
  .mic:active, .send:active {
    background: rgba(255, 43, 208, 0.18);
    color: var(--magenta);
  }
  .mic.recording {
    background: rgba(255, 0, 68, 0.18);
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1s infinite;
  }
  .send {
    color: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 8px rgba(0, 240, 255, 0.35);
  }
  .send:disabled, .mic:disabled { opacity: 0.4; }

  textarea {
    flex: 1;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(0, 240, 255, 0.2);
    padding: 12px 16px;
    color: var(--fg);
    font-size: 15px;
    font-family: inherit;
    line-height: 1.4;
    resize: none;
    max-height: 140px;
    min-height: 48px;
    outline: none;
    transition: border-color 150ms ease;
    clip-path: polygon(
      0 10px, 10px 0,
      100% 0, 100% calc(100% - 10px),
      calc(100% - 10px) 100%, 0 100%
    );
  }
  textarea:focus { border-color: rgba(0, 240, 255, 0.6); }
  textarea::placeholder { color: var(--mute); }

  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--mute);
    letter-spacing: 0.3em;
    padding: 4px 0 0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="title">NEON<span class="accent">//</span>INPUT</div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusTxt">…</span>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="empty" id="empty">// WAITING FOR ROUND</div>
  </div>

  <div class="suggs" id="suggs"></div>

  <div class="composer">
    <button class="mic" id="micBtn" title="voice input" aria-label="voice input">🎤</button>
    <textarea id="ta" rows="1" placeholder="Type your answer..."></textarea>
    <button class="send" id="sendBtn" title="send" aria-label="send">➤</button>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const chat    = $('chat');
  const empty   = $('empty');
  const suggs   = $('suggs');
  const ta      = $('ta');
  const sendBtn = $('sendBtn');
  const micBtn  = $('micBtn');

  let history     = [];
  let suggestions = [];
  let busy        = false;

  /* ---------- rendering ---------- */
  function renderChat() {
    chat.innerHTML = '';
    if (!history.length) {
      chat.appendChild(empty);
      return;
    }
    for (const m of history) {
      const div = document.createElement('div');
      div.className = 'msg ' + m.role + (m.kind === 'hint' ? ' hint' : '');
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = m.role === 'user'
        ? 'YOU'
        : (m.kind === 'hint' ? 'HINT' : (m.kind === 'end' ? 'FEEDBACK' : 'INTERVIEWER'));
      const body = document.createElement('div');
      body.textContent = m.content.replace(/^HINT:\s*/, '');
      div.appendChild(who);
      div.appendChild(body);
      chat.appendChild(div);
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function renderSuggs() {
    suggs.innerHTML = '';
    suggestions.forEach(s => {
      const b = document.createElement('button');
      b.className = 'sugg';
      b.textContent = s;
      b.disabled = busy;
      b.addEventListener('click', () => sendText(s));
      suggs.appendChild(b);
    });
  }

  function setStatus(state, text) {
    $('dot').className = 'dot ' + state;
    $('statusTxt').textContent = text;
  }

  /* ---------- API ---------- */
  async function sendText(text) {
    if (busy || !text.trim()) return;
    busy = true;
    setStatus('thinking', 'THINKING');
    sendBtn.disabled = true; micBtn.disabled = true;
    renderSuggs();
    try {
      await fetch('/api/say', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text.trim() }),
      });
      ta.value = '';
      autoSize();
    } catch (e) {
      setStatus('error', 'OFFLINE');
    } finally {
      sendBtn.disabled = false; micBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', () => sendText(ta.value));
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      sendText(ta.value);
    }
  });

  function autoSize() {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  }
  ta.addEventListener('input', autoSize);

  /* ---------- voice (Web Speech API, en-US) ---------- */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;
  if (SR) {
    recog = new SR();
    recog.lang = 'en-US';
    recog.interimResults = true;
    recog.continuous = false;
    recog.onresult = e => {
      let final = '', interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t; else interim += t;
      }
      if (final)        ta.value = (ta.value + ' ' + final).trim();
      else if (interim) ta.placeholder = interim;
      autoSize();
    };
    recog.onend = () => {
      micBtn.classList.remove('recording');
      ta.placeholder = 'Type your answer...';
    };
    recog.onerror = () => {
      micBtn.classList.remove('recording');
      ta.placeholder = 'SPEECH ERROR';
      setTimeout(() => { ta.placeholder = 'Type your answer...'; }, 1500);
    };
    micBtn.addEventListener('click', () => {
      if (micBtn.classList.contains('recording')) {
        try { recog.stop(); } catch {}
      } else {
        try {
          recog.start();
          micBtn.classList.add('recording');
          ta.placeholder = 'LISTENING...';
        } catch {}
      }
    });
  } else {
    micBtn.disabled = true;
    micBtn.title = 'Speech recognition not supported in this browser';
  }

  /* ---------- SSE ---------- */
  function connect() {
    const es = new EventSource('/api/events');
    es.onopen  = () => setStatus('live', 'LIVE');
    es.onerror = () => {
      setStatus('error', 'RECONNECTING');
      setTimeout(() => { try { es.close(); } catch{} connect(); }, 2000);
    };
    es.onmessage = ev => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'snapshot') {
        history     = m.history     || [];
        suggestions = m.suggestions || [];
        busy = false;
        setStatus('live', 'LIVE');
        renderChat();
        renderSuggs();
      } else if (m.type === 'append') {
        history.push(m.message);
        renderChat();
        if (m.message.role === 'assistant') {
          busy = false;
          setStatus('live', 'LIVE');
        }
      } else if (m.type === 'suggestions') {
        suggestions = m.suggestions || [];
        busy = false;
        setStatus('live', 'LIVE');
        renderSuggs();
      }
    };
  }
  connect();
</script>
</body>
</html>
